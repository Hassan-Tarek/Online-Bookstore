server:
  port: ${SERVER_PORT:8080}

  tomcat:
    max-part-count: 50

spring:
  application:
    name: Online-Bookstore

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

app:
  settings:
    admin: admin@bookstore.com
    tax: 8
    shipping-fees:
      standard: 5
      express: 15
      overnight: 30
      free: 0
    currency: USD
    return-period: 30d

  frontend:
    url: ${FRONTEND_URL}
    verification-path: ${FRONTEND_VERIFY_PATH:/verify}
    password-reset-path: ${FRONTEND_RESET_PASSWORD_PATH:/reset-password}

  ttl:
    auth:
      access: 1h
      refresh: 7d
      verification: 15m
      password-reset: 30m
    cache:
      catalog: 1h

  security:
    cors:
      origins: ${CORS_ORIGINS:*}
      methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      headers: Authorization,Content-Type,Accept,Origin,Cookie,Set-Cookie,X-Requested-With

    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-token-ttl: 1h
      refresh-token-ttl: 7d
      refresh-token-cookie:
        name: refresh_token
        domain: ${COOKIE_DOMAIN:}
        secure: ${COOKIE_SECURE:false}
        path: /
        same-site: Lax
        max-age: 7d

  integration:
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME}
      api-key: ${CLOUDINARY_API_KEY}
      api-secret: ${CLOUDINARY_API_SECRET}
      folder: ${CLOUDINARY_FOLDER}

    stripe:
      secret-key: ${STRIPE_SECRET_KEY}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET}
