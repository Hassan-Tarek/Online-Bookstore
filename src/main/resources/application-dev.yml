spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bookstore_dev
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: Hikari-DEV
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
      ssl:
        enabled: false

  mail:
    host: localhost
    port: 1025

logging:
  level:
    root: DEBUG
    com.bookstore: DEBUG
    org.springframework.security: DEBUG
